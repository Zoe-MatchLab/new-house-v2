<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>房产AI作业平台 - 小程序端原型</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: #F7F8FA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: #1D2129;
            margin-bottom: 30px;
            font-size: 20px;
        }
        .modules {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .module {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            text-decoration: none;
            color: #4E5969;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .module:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .module-icon {
            font-size: 28px;
        }
        .module-info {
            flex: 1;
            text-align: left;
        }
        .module-name {
            font-size: 15px;
            font-weight: 600;
            color: #1D2129;
        }
        .module-desc {
            font-size: 12px;
            color: #86909C;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 房产AI作业平台 - 小程序端原型</h1>
        <div class="modules">
            <a href="home/home.html" class="module">
                <div class="module-icon">🏠</div>
                <div class="module-info">
                    <div class="module-name">首页</div>
                    <div class="module-desc">工作台与任务概览</div>
                </div>
            </a>
            <a href="task/create.html" class="module">
                <div class="module-icon">📋</div>
                <div class="module-info">
                    <div class="module-name">创建任务</div>
                    <div class="module-desc">任务创建页面</div>
                </div>
            </a>
            <a href="task/detail.html" class="module">
                <div class="module-icon">📝</div>
                <div class="module-info">
                    <div class="module-name">任务详情</div>
                    <div class="module-desc">管理员视角任务详情</div>
                </div>
            </a>
            <a href="task/executor-detail.html" class="module">
                <div class="module-icon">👤</div>
                <div class="module-info">
                    <div class="module-name">执行者任务详情</div>
                    <div class="module-desc">执行者视角任务详情</div>
                </div>
            </a>
            <a href="task/confirm-script.html" class="module">
                <div class="module-icon">✍️</div>
                <div class="module-info">
                    <div class="module-name">文案确认</div>
                    <div class="module-desc">阶段3文案确认</div>
                </div>
            </a>
            <a href="task/confirm-cover.html" class="module">
                <div class="module-icon">🎨</div>
                <div class="module-info">
                    <div class="module-name">封面确认</div>
                    <div class="module-desc">阶段4封面确认</div>
                </div>
            </a>
            <a href="customer/list.html" class="module">
                <div class="module-icon">👥</div>
                <div class="module-info">
                    <div class="module-name">客户管理</div>
                    <div class="module-desc">客户信息管理</div>
                </div>
            </a>
            <a href="recording/list.html" class="module">
                <div class="module-icon">🎙️</div>
                <div class="module-info">
                    <div class="module-name">录音管理</div>
                    <div class="module-desc">录音文件管理</div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
