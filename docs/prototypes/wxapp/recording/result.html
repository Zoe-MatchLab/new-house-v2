<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分析结果 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/marked/marked.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-dark: #E67A0E;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-warning: #FF7D00;
            --color-danger: #FA5151;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.6;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }

        .page { min-height: 100vh; padding-bottom: calc(32px + env(safe-area-inset-bottom)); }

        /* 顶部导航 */
        .nav-bar {
            height: 44px;
            background: white;
            padding: 0 var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #F0F0F0;
        }

        .nav-back {
            color: var(--brand-primary);
            font-size: 16px;
            padding: var(--spacing-xs);
            text-decoration: none;
        }

        .nav-title {
            flex: 1;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: var(--color-title);
            margin-right: 32px;
        }

        .nav-share {
            color: var(--brand-primary);
            font-size: 16px;
            cursor: pointer;
            padding: var(--spacing-xs);
        }

        /* 录音信息卡片 */
        .audio-card {
            margin: var(--spacing-md);
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--spacing-md);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .audio-play-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--brand-primary);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(250, 140, 22, 0.3);
        }

        .audio-info { flex: 1; min-width: 0; }

        .audio-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-title);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .audio-meta {
            font-size: 12px;
            color: var(--color-sub);
            margin-top: 2px;
        }

        /* 分析结果卡片 */
        .analysis-card {
            margin: 0 var(--spacing-md) var(--spacing-md);
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        /* Markdown 内容样式 */
        .markdown-body {
            padding: var(--spacing-md);
            font-size: 14px;
            line-height: 1.8;
        }

        .markdown-body h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-sm);
            border-bottom: 2px solid var(--brand-primary);
        }

        .markdown-body h2 {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-title);
            margin-top: var(--spacing-lg);
            margin-bottom: var(--spacing-sm);
        }

        .markdown-body h2:first-of-type {
            margin-top: 0;
        }

        .markdown-body p {
            margin-bottom: var(--spacing-sm);
            color: var(--color-text);
        }

        .markdown-body ul, .markdown-body ol {
            margin: var(--spacing-sm) 0;
            padding-left: 20px;
        }

        .markdown-body li {
            margin-bottom: var(--spacing-xs);
        }

        .markdown-body strong {
            font-weight: 600;
            color: var(--color-title);
        }

        .markdown-body blockquote {
            margin: var(--spacing-sm) 0;
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--color-bg);
            border-left: 3px solid var(--brand-primary);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            color: var(--color-sub);
        }

        .markdown-body hr {
            border: none;
            border-top: 1px solid var(--color-border);
            margin: var(--spacing-md) 0;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: var(--spacing-sm) 0;
        }

        .markdown-body th, .markdown-body td {
            padding: 8px 12px;
            border: 1px solid var(--color-border);
            text-align: left;
            font-size: 13px;
        }

        .markdown-body th {
            background: var(--color-bg);
            font-weight: 600;
            color: var(--color-title);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            z-index: 99999;
            font-size: 14px;
            animation: toastIn 0.3s ease forwards;
            pointer-events: none;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- 顶部导航 -->
        <div class="nav-bar">
            <a href="list.html" class="nav-back"><i class="fa fa-chevron-left"></i></a>
            <div class="nav-title">分析结果</div>
            <i class="fa fa-share-alt nav-share" onclick="showToast('已分享')"></i>
        </div>

        <!-- 录音信息 -->
        <div class="audio-card">
            <button class="audio-play-btn">
                <i class="fa fa-play"></i>
            </button>
            <div class="audio-info">
                <div class="audio-name">通话录音_20260412.wav</div>
                <div class="audio-meta">张三 · 2026-04-12 14:30 · 5分32秒</div>
            </div>
        </div>

        <!-- Markdown 分析结果 -->
        <div class="analysis-card">
            <div class="markdown-body" id="markdownContent"></div>
        </div>
    </div>

    <script>
        // 分析数据
        const analysisData = {
            recordId: 'RECORD_001',
            name: '通话录音_20260412.wav',
            customer: '张三',
            duration: '5分32秒',
            time: '2026-04-12 14:30',
            score: 85,
            speechSkills: {
                opening: 85,
                needs: 80,
                objection: 90
            },
            intentLevel: '高',
            customerNeeds: '客户主要关注110-130㎡的三室户型，预算在800-1000万之间。对学区资源和周边地铁配套有明确需求，属于改善型购房客户。',
            extractedInfo: {
                name: '张先生',
                phone: '未在录音中提及',
                budget: '800-1000万',
                layout: '110-130㎡三室',
                coreNeeds: '学区资源、地铁配套',
                purpose: '改善型需求'
            },
            improvementSuggestions: [
                '建议加强需求挖掘环节，在客户回答后追加"为什么"类问题，深入了解真实需求和决策权重。',
                '异议处理环节表现较好，但可以更果断地给出解决方案，减少客户犹豫时间。',
                '开场白略显冗长，建议在前30秒内完成价值主张表达，提高客户注意力。'
            ]
        };

        // 生成 Markdown 内容
        function generateMarkdown(data) {
            const getIntentIcon = (level) => level === '高' ? '↑' : level === '中' ? '→' : '↓';

            return `# 📊 录音分析报告

## 综合评分

**${data.score}分** ${getIntentIcon(data.intentLevel)} 购买意向${data.intentLevel}

> 话术表现${data.score >= 85 ? '优秀' : data.score >= 70 ? '良好' : '一般'}，${data.score >= 85 ? '继续保持' : '有小幅提升空间'}

---

## 客户画像

| 属性 | 信息 |
|:-----|:-----|
| 客户姓名 | ${data.extractedInfo.name} |
| 手机号 | ${data.extractedInfo.phone} |
| 预算范围 | **${data.extractedInfo.budget}** |
| 意向户型 | ${data.extractedInfo.layout} |
| 核心需求 | ${data.extractedInfo.coreNeeds} |
| 购房目的 | ${data.extractedInfo.purpose} |

---

## 话术技巧

| 维度 | 得分 |
|:-----|:----:|
| 开场白 | **${data.speechSkills.opening}**分 |
| 需求挖掘 | **${data.speechSkills.needs}**分 |
| 异议处理 | **${data.speechSkills.objection}**分 |

---

## 客户需求

**需求标签：** 三室户型 | 价格敏感 | 关注学区 | 改善型需求

${data.customerNeeds}

---

## 改进建议

1. ${data.improvementSuggestions[0]}

2. ${data.improvementSuggestions[1]}

3. ${data.improvementSuggestions[2]}

---

*分析时间：${data.time}*`;
        }

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                setTimeout(() => t.remove(), 200);
            }, 2000);
        }

        // 初始化 - 渲染 Markdown
        window.onload = function() {
            const markdownContent = generateMarkdown(analysisData);
            document.getElementById('markdownContent').innerHTML = marked.parse(markdownContent);
        };
    </script>
</body>
</html>
