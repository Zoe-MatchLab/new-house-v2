<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新增客户 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-dark: #E67A0E;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-warning: #FF7D00;
            --color-danger: #FA5151;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --radius-md: 8px;
            --radius-lg: 12px;
            --spacing-md: 16px;
            --spacing-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            font-size: 14px;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }

        .page {
            min-height: 100vh;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }

        /* 顶部导航 */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--spacing-md);
            z-index: 100;
            border-bottom: 1px solid var(--color-border);
        }

        .nav-back {
            color: var(--brand-primary);
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            user-select: none;
        }

        .nav-back:active { opacity: 0.7; }

        .nav-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--color-title);
        }

        .nav-placeholder { width: 60px; }

        /* 说明文字 */
        .page-tip {
            padding: var(--spacing-md);
            padding-top: 60px;
            font-size: 13px;
            color: var(--color-sub);
            background: var(--color-bg);
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }

        .page-tip i { margin-top: 2px; }

        /* 卡片表单 */
        .form-card {
            background: white;
            border-radius: var(--radius-lg);
            margin: 0 var(--spacing-md);
        }

        .form-item {
            display: flex;
            align-items: flex-start;
            padding: 14px var(--spacing-md);
            border-bottom: 1px solid var(--color-border);
        }

        .form-item:last-child { border-bottom: none; }

        .form-label {
            width: 70px;
            font-size: 15px;
            color: var(--color-title);
            padding-top: 2px;
            flex-shrink: 0;
        }

        .form-label.required::after {
            content: ' *';
            color: var(--color-danger);
        }

        .form-control { flex: 1; }

        .form-input {
            width: 100%;
            font-size: 15px;
            color: var(--color-title);
            border: none;
            outline: none;
            background: transparent;
            line-height: 1.5;
        }

        .form-input::placeholder { color: #C9CDD4; }

        .form-textarea {
            width: 100%;
            font-size: 15px;
            color: var(--color-title);
            border: none;
            outline: none;
            background: transparent;
            line-height: 1.5;
            resize: none;
            min-height: 60px;
        }

        .form-textarea::placeholder { color: #C9CDD4; }

        /* 意向楼盘标签 */
        .building-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .building-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: var(--brand-primary-light);
            color: var(--brand-primary);
            border-radius: 14px;
            font-size: 13px;
        }

        .building-tag .remove {
            cursor: pointer;
            opacity: 0.6;
        }

        .building-tag .remove:hover { opacity: 1; }

        .add-building-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: var(--color-bg);
            color: var(--color-text);
            border-radius: 14px;
            font-size: 13px;
            cursor: pointer;
        }

        .add-building-btn:active { opacity: 0.7; }

        /* 底部按钮 */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px var(--spacing-md);
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background: white;
            border-top: 1px solid var(--color-border);
            z-index: 100;
        }

        .btn-primary {
            width: 100%;
            height: 44px;
            background: var(--brand-primary);
            color: white;
            border: none;
            border-radius: 22px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.15s ease;
        }

        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10000;
            animation: fadeIn 0.3s ease forwards;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 楼盘选择弹窗 */
        .picker-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            display: none;
        }

        .picker-modal.show { display: flex; }

        .picker-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
        }

        .picker-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 16px 16px 0 0;
            max-height: 70vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .picker-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid var(--color-border);
        }

        .picker-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-title);
        }

        .picker-cancel {
            color: var(--color-text);
            font-size: 14px;
            cursor: pointer;
        }

        .picker-confirm {
            color: var(--brand-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .picker-body {
            padding: 16px;
        }

        .picker-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--color-border);
        }

        .picker-item:last-child { border-bottom: none; }

        .picker-item-name {
            font-size: 15px;
            color: var(--color-title);
        }

        .picker-item-check {
            color: var(--brand-primary);
            font-size: 16px;
        }

        .picker-empty {
            text-align: center;
            padding: 40px 0;
            color: var(--color-sub);
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- 顶部导航 -->
        <div class="nav-bar">
            <div class="nav-back" onclick="goBack()">
                <i class="fa fa-chevron-left"></i>
                <span>返回</span>
            </div>
            <span class="nav-title">新增客户</span>
            <div class="nav-placeholder"></div>
        </div>

        <!-- 说明 -->
        <div class="page-tip">
            <i class="fa fa-info-circle"></i>
            <span>填写客户信息，用于关联录音分析</span>
        </div>

        <!-- 表单卡片 -->
        <div class="form-card">
            <!-- 客户姓名 -->
            <div class="form-item">
                <div class="form-label required">姓名</div>
                <div class="form-control">
                    <input type="text" class="form-input" id="name" placeholder="请输入客户姓名" maxlength="20">
                </div>
            </div>

            <!-- 手机号 -->
            <div class="form-item">
                <div class="form-label">手机号</div>
                <div class="form-control">
                    <input type="tel" class="form-input" id="phone" placeholder="选填" maxlength="11">
                </div>
            </div>

            <!-- 意向楼盘 -->
            <div class="form-item" style="align-items: flex-start;">
                <div class="form-label">意向楼盘</div>
                <div class="form-control">
                    <div class="building-tags" id="buildingTags">
                        <div class="add-building-btn" onclick="showBuildingPicker()">
                            <i class="fa fa-plus"></i> 添加楼盘
                        </div>
                    </div>
                </div>
            </div>

            <!-- 客户来源 -->
            <div class="form-item">
                <div class="form-label">来源</div>
                <div class="form-control">
                    <input type="text" class="form-input" id="source" placeholder="请输入客户来源，如：线上获客、转介绍等" maxlength="50">
                </div>
            </div>

            <!-- 备注 -->
            <div class="form-item" style="align-items: flex-start;">
                <div class="form-label">备注</div>
                <div class="form-control">
                    <textarea class="form-textarea" id="remark" placeholder="选填，可记录客户偏好、需求等信息" rows="3" maxlength="200"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部保存按钮 -->
    <div class="bottom-bar">
        <button class="btn-primary" onclick="saveCustomer()">保存</button>
    </div>

    <!-- 楼盘选择弹窗 -->
    <div class="picker-modal" id="buildingPicker">
        <div class="picker-overlay" onclick="closeBuildingPicker()"></div>
        <div class="picker-content">
            <div class="picker-header">
                <span class="picker-cancel" onclick="closeBuildingPicker()">取消</span>
                <span class="picker-title">选择意向楼盘</span>
                <span class="picker-confirm" onclick="confirmBuildingSelection()">确定</span>
            </div>
            <div class="picker-body" id="buildingList">
                <!-- 动态渲染 -->
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // 楼盘数据
        const buildingsData = [
            { id: 1, name: '万科城市花园' },
            { id: 2, name: '中海汇德里' },
            { id: 3, name: '保利中央公园' },
            { id: 4, name: '龙湖天璞' },
            { id: 5, name: '华润置地' },
            { id: 6, name: '金地集团' }
        ];

        // 已选择的楼盘
        let selectedBuildings = [];

        // 显示Toast
        function showToast(message) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = message;
            document.body.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                setTimeout(() => t.remove(), 200);
            }, 2000);
        }

        // 返回
        function goBack() {
            window.location.href = 'list.html';
        }

        // 校验表单
        function validateForm() {
            const name = document.getElementById('name').value.trim();

            if (!name) {
                showToast('请输入客户姓名');
                return false;
            }

            return true;
        }

        // 保存客户
        function saveCustomer() {
            if (!validateForm()) {
                return;
            }

            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const source = document.getElementById('source').value.trim();
            const remark = document.getElementById('remark').value.trim();

            const customerData = {
                id: 'CUST_' + Date.now(),
                name,
                phone,
                buildings: selectedBuildings.map(b => b.name),
                source,
                remark,
                createTime: new Date().toLocaleString()
            };

            console.log('保存客户信息:', customerData);

            showToast('保存成功');

            setTimeout(() => {
                window.location.href = 'list.html';
            }, 1500);
        }

        // 显示楼盘选择弹窗
        function showBuildingPicker() {
            renderBuildingList();
            document.getElementById('buildingPicker').classList.add('show');
        }

        // 关闭楼盘选择弹窗
        function closeBuildingPicker() {
            document.getElementById('buildingPicker').classList.remove('show');
        }

        // 渲染楼盘列表
        function renderBuildingList() {
            const list = document.getElementById('buildingList');
            
            if (buildingsData.length === 0) {
                list.innerHTML = '<div class="picker-empty">暂无可选楼盘</div>';
                return;
            }

            list.innerHTML = buildingsData.map(building => {
                const isSelected = selectedBuildings.some(b => b.id === building.id);
                return `
                    <div class="picker-item" onclick="toggleBuilding(${building.id})">
                        <span class="picker-item-name">${building.name}</span>
                        <span class="picker-item-check" style="opacity: ${isSelected ? 1 : 0}">
                            <i class="fa fa-check-circle"></i>
                        </span>
                    </div>
                `;
            }).join('');
        }

        // 切换楼盘选择
        function toggleBuilding(id) {
            const building = buildingsData.find(b => b.id === id);
            if (!building) return;

            const index = selectedBuildings.findIndex(b => b.id === id);
            if (index > -1) {
                selectedBuildings.splice(index, 1);
            } else {
                selectedBuildings.push(building);
            }

            renderBuildingList();
            renderBuildingTags();
        }

        // 渲染已选楼盘标签
        function renderBuildingTags() {
            const container = document.getElementById('buildingTags');
            const addBtn = `
                <div class="add-building-btn" onclick="showBuildingPicker()">
                    <i class="fa fa-plus"></i> 添加楼盘
                </div>
            `;

            if (selectedBuildings.length === 0) {
                container.innerHTML = addBtn;
                return;
            }

            const tags = selectedBuildings.map(building => `
                <span class="building-tag">
                    ${building.name}
                    <span class="remove" onclick="removeBuilding(${building.id})">
                        <i class="fa fa-times"></i>
                    </span>
                </span>
            `).join('');

            container.innerHTML = tags + addBtn;
        }

        // 移除楼盘
        function removeBuilding(id) {
            event.stopPropagation();
            selectedBuildings = selectedBuildings.filter(b => b.id !== id);
            renderBuildingTags();
        }

        // 确认楼盘选择
        function confirmBuildingSelection() {
            closeBuildingPicker();
        }

        // 初始化
        renderBuildingTags();
    </script>
</body>
</html>
