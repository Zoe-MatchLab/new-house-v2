<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理 - 房产AI作业平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                        dark: '#1D2129',
                    }
                }
            }
        }
    </script>
    <style>
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .tag-potential { background: #F0F5FF; color: #165DFF; }
        .tag-following { background: #FFF7E8; color: #FF7D00; }
        .tag-dealed { background: #E8FFEA; color: #00B42A; }
        .tag-lost { background: #F2F3F5; color: #4E5969; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部导航 -->
    <div class="bg-primary text-white px-4 py-3 sticky top-0 z-50">
        <div class="flex items-center justify-between">
            <div class="text-lg font-medium">客户管理</div>
            <a href="form.html" class="text-white">
                <i class="fa fa-plus text-xl"></i>
            </a>
        </div>
    </div>

    <!-- 筛选标签 -->
    <div class="bg-white px-4 py-3 sticky top-14 z-40">
        <div class="flex gap-2 overflow-x-auto">
            <button onclick="filterByStatus('')" class="filter-btn active px-3 py-1.5 rounded-full text-sm whitespace-nowrap bg-primary text-white">
                全部
            </button>
            <button onclick="filterByStatus('potential')" class="filter-btn px-3 py-1.5 rounded-full text-sm whitespace-nowrap bg-gray-100 text-gray-600">
                潜在
            </button>
            <button onclick="filterByStatus('following')" class="filter-btn px-3 py-1.5 rounded-full text-sm whitespace-nowrap bg-gray-100 text-gray-600">
                跟进中
            </button>
            <button onclick="filterByStatus('dealed')" class="filter-btn px-3 py-1.5 rounded-full text-sm whitespace-nowrap bg-gray-100 text-gray-600">
                成交
            </button>
            <button onclick="filterByStatus('lost')" class="filter-btn px-3 py-1.5 rounded-full text-sm whitespace-nowrap bg-gray-100 text-gray-600">
                流失
            </button>
        </div>
    </div>

    <!-- 客户列表 -->
    <div class="p-4 space-y-3" id="customerList">
    </div>

    <style>
        .customer-card:active {
            background-color: #f5f5f5;
        }
    </style>

    <script>
        // 客户数据
        const customersData = [
            {
                id: 1,
                name: '王女士',
                phone: '138****1234',
                buildingName: '万科城市花园',
                status: 'following',
                statusText: '跟进中',
                recordCount: 8,
                lastFollowTime: '2026-04-16 14:30'
            },
            {
                id: 2,
                name: '李先生',
                phone: '139****5678',
                buildingName: '中海汇德里',
                status: 'dealed',
                statusText: '成交',
                recordCount: 12,
                lastFollowTime: '2026-04-15 10:20'
            },
            {
                id: 3,
                name: '张女士',
                phone: '137****9012',
                buildingName: '金隅学府',
                status: 'potential',
                statusText: '潜在',
                recordCount: 2,
                lastFollowTime: '2026-04-14 16:45'
            },
            {
                id: 4,
                name: '刘先生',
                phone: '136****3456',
                buildingName: '远洋LAVIE',
                status: 'lost',
                statusText: '流失',
                recordCount: 5,
                lastFollowTime: '2026-04-10 09:30'
            },
            {
                id: 5,
                name: '陈女士',
                phone: '135****7890',
                buildingName: '招商公园1872',
                status: 'following',
                statusText: '跟进中',
                recordCount: 6,
                lastFollowTime: '2026-04-16 11:15'
            }
        ];

        let currentFilter = '';

        // 渲染列表
        function renderList(data) {
            const container = document.getElementById('customerList');
            
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <div class="text-gray-400 text-5xl mb-4"><i class="fa fa-users"></i></div>
                        <div class="text-gray-500">暂无客户</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = data.map(item => `
                <a href="detail.html?id=${item.id}" class="customer-card block bg-white rounded-lg p-4">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-medium">
                                ${item.name.charAt(0)}
                            </div>
                            <div>
                                <div class="font-medium text-gray-800">${item.name}</div>
                                <div class="text-xs text-gray-400">${item.phone}</div>
                            </div>
                        </div>
                        <span class="tag tag-${item.status}">${item.statusText}</span>
                    </div>
                    <div class="flex items-center justify-between text-sm">
                        <div class="text-gray-500">
                            <i class="fa fa-building-o mr-1"></i>${item.buildingName}
                        </div>
                        <div class="text-gray-400 text-xs">
                            ${item.recordCount}条跟进
                        </div>
                    </div>
                </a>
            `).join('');
        }

        // 按状态筛选
        function filterByStatus(status) {
            currentFilter = status;
            
            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-primary', 'text-white');
                btn.classList.add('bg-gray-100', 'text-gray-600');
            });
            event.target.classList.remove('bg-gray-100', 'text-gray-600');
            event.target.classList.add('bg-primary', 'text-white');

            let filtered = customersData;
            if (status) {
                filtered = customersData.filter(item => item.status === status);
            }
            renderList(filtered);
        }

        // 初始化
        renderList(customersData);
    </script>
</body>
</html>
