<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理 - 房产AI作业平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                        dark: '#1D2129',
                    }
                }
            }
        }
    </script>
    <style>
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .tag-potential { background: #F0F5FF; color: #165DFF; }
        .tag-following { background: #FFF7E8; color: #FF7D00; }
        .tag-dealed { background: #E8FFEA; color: #00B42A; }
        .tag-lost { background: #F2F3F5; color: #4E5969; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 顶部导航 -->
    <div class="bg-primary text-white px-4 py-3 sticky top-0 z-50">
        <div class="flex items-center justify-between">
            <div class="text-lg font-medium">客户管理</div>
            <a href="form.html" class="text-white">
                <i class="fa fa-plus text-xl"></i>
            </a>
        </div>
    </div>

    <!-- 筛选标签 -->
    <div class="bg-white px-4 py-3 sticky top-14 z-40">
        <div class="text-sm text-gray-500">我的客户（共 <span class="text-primary font-medium">5</span> 位）</div>
    </div>

    <!-- 客户列表 -->
    <div class="p-4 space-y-3" id="customerList">
    </div>

    <style>
        .customer-card:active {
            background-color: #f5f5f5;
        }
    </style>

    <script>
        // 渲染列表
        function renderList(data) {
            const container = document.getElementById('customerList');
            
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <div class="text-gray-400 text-5xl mb-4"><i class="fa fa-users"></i></div>
                        <div class="text-gray-500">暂无客户</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = data.map(item => `
                <a href="detail.html?id=${item.id}" class="customer-card block bg-white rounded-lg p-4 mb-3">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-primary text-white flex items-center justify-center font-medium text-lg">
                                ${item.name.charAt(0)}
                            </div>
                            <div>
                                <div class="font-medium text-gray-800">${item.name}</div>
                                <div class="text-sm text-gray-400">${item.phone}</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-sm text-primary font-medium">${item.recordCount} 条录音</div>
                            <div class="text-xs text-gray-400">${item.createTime}</div>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        // 初始化
        renderList(customersData);
    </script>
</body>
</html>
