<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的客户 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-dark: #E67A0E;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-warning: #FF7D00;
            --color-danger: #FA5151;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --color-card: #FFFFFF;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
            --font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: var(--font-family);
            font-size: 14px;
            line-height: 1.5;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }

        .page {
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* 顶部导航 */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: var(--brand-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .nav-title {
            font-size: 17px;
            font-weight: 600;
        }

        /* 搜索栏 */
        .search-bar {
            position: fixed;
            top: 44px;
            left: 0;
            right: 0;
            background: white;
            padding: var(--spacing-md);
            z-index: 90;
            box-shadow: var(--shadow-sm);
        }

        .search-input {
            width: 100%;
            height: 36px;
            background: var(--color-bg);
            border: none;
            border-radius: 18px;
            padding: 0 var(--spacing-md) 0 36px;
            font-size: 14px;
            outline: none;
        }

        .search-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-sub);
        }

        /* 筛选标签 */
        .filter-tabs {
            display: flex;
            gap: var(--spacing-sm);
            padding: 0 var(--spacing-md);
            background: white;
            padding-bottom: var(--spacing-md);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .filter-tabs::-webkit-scrollbar {
            display: none;
        }

        .filter-tab {
            flex-shrink: 0;
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 13px;
            background: var(--color-bg);
            color: var(--color-text);
            border: 1px solid transparent;
        }

        .filter-tab.active {
            background: var(--brand-primary-light);
            color: var(--brand-primary);
            border-color: var(--brand-primary);
        }

        /* 客户列表 */
        .customer-list {
            padding: var(--spacing-md);
            padding-top: 140px;
        }

        .customer-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            box-shadow: var(--shadow-sm);
        }

        .customer-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--spacing-sm);
        }

        .customer-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-title);
        }

        .customer-phone {
            font-size: 13px;
            color: var(--color-sub);
            margin-top: 2px;
        }

        .customer-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .tag-danger {
            background: #FFF1F0;
            color: var(--color-danger);
        }

        .tag-warning {
            background: #FFF7E6;
            color: var(--color-warning);
        }

        .tag-success {
            background: #E6FFF1;
            color: var(--color-success);
        }

        .customer-info {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            font-size: 13px;
            color: var(--color-text);
            margin-bottom: var(--spacing-sm);
        }

        .customer-info-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .customer-building {
            background: var(--color-bg);
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-sm);
        }

        .customer-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: var(--spacing-sm);
            border-top: 1px solid var(--color-border);
            font-size: 12px;
            color: var(--color-sub);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 48px;
            color: var(--color-sub);
            margin-bottom: var(--spacing-md);
        }

        .empty-text {
            color: var(--color-sub);
            font-size: 14px;
        }

        /* 底部新增按钮 */
        .add-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 375px;
            height: 48px;
            background: var(--brand-primary);
            color: white;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-sm);
            box-shadow: 0 4px 12px rgba(250, 140, 22, 0.4);
            z-index: 100;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10000;
            display: none;
        }

        .toast.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- 顶部导航 -->
        <div class="nav-bar">
            <span class="nav-title">我的客户</span>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <div class="search-wrapper">
                <i class="fa fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="搜索姓名/电话..." id="searchInput" oninput="handleSearch()">
            </div>
        </div>

        <!-- 筛选标签 -->
        <div class="filter-tabs" style="padding-top: 100px;">
            <div class="filter-tab active" onclick="filterByLevel('')">全部</div>
            <div class="filter-tab" onclick="filterByLevel('high')">高意向</div>
            <div class="filter-tab" onclick="filterByLevel('medium')">中意向</div>
            <div class="filter-tab" onclick="filterByLevel('low')">低意向</div>
        </div>

        <!-- 客户列表 -->
        <div class="customer-list" id="customerList">
            <!-- 客户卡片1 -->
            <div class="customer-card" onclick="goToDetail('CUST_001')">
                <div class="customer-header">
                    <div>
                        <div class="customer-name">张先生</div>

                <div class="customer-info">

                        <i class="fa fa-home"></i>

                    </div>
                    <div class="customer-info-item">
                        <i class="fa fa-user"></i>
                        <span>线上获客</span>
                    </div>
                </div>
                <div class="customer-footer">
                    <span>最新跟进：2小时前</span>
                    <span class="text-primary">查看详情 ></span>
                </div>
            </div>

            <!-- 客户卡片2 -->
            <div class="customer-card" onclick="goToDetail('CUST_002')">
                <div class="customer-header">
                    <div>
                        <div class="customer-name">李女士</div>
                        <div class="customer-phone">139****6666</div>
                    </div>
                    <span class="customer-tag tag-warning">中意向</span>
                </div>
                <div class="customer-info">
                    <div class="customer-info-item">
                        <i class="fa fa-home"></i>
                        <span class="customer-building">保利中央公园</span>
                    </div>
                    <div class="customer-info-item">
                        <i class="fa fa-user"></i>
                        <span>转介绍</span>
                    </div>
                </div>
                <div class="customer-footer">
                    <span>最新跟进：1天前</span>
                    <span class="text-primary">查看详情 ></span>
                </div>
            </div>

            <!-- 客户卡片3 -->
            <div class="customer-card" onclick="goToDetail('CUST_003')">
                <div class="customer-header">
                    <div>
                        <div class="customer-name">王先生</div>
                        <div class="customer-phone">137****5555</div>
                    </div>
                    <span class="customer-tag tag-success">低意向</span>
                </div>
                <div class="customer-info">
                    <div class="customer-info-item">
                        <i class="fa fa-home"></i>
                        <span class="customer-building">万科城市之光</span>
                    </div>
                    <div class="customer-info-item">
                        <i class="fa fa-user"></i>
                        <span>自然到访</span>
                    </div>
                </div>
                <div class="customer-footer">
                    <span>最新跟进：3天前</span>
                    <span class="text-primary">查看详情 ></span>
                </div>
            </div>

            <!-- 客户卡片4 -->
            <div class="customer-card" onclick="goToDetail('CUST_004')">
                <div class="customer-header">
                    <div>
                        <div class="customer-name">赵女士</div>
                        <div class="customer-phone">136****4444</div>
                    </div>
                    <span class="customer-tag tag-danger">高意向</span>
                </div>
                <div class="customer-info">
                    <div class="customer-info-item">
                        <i class="fa fa-home"></i>
                        <span class="customer-building">中海汇德里、保利中央公园</span>
                    </div>
                    <div class="customer-info-item">
                        <i class="fa fa-user"></i>
                        <span>线上获客</span>
                    </div>
                </div>
                <div class="customer-footer">
                    <span>最新跟进：今天</span>
                    <span class="text-primary">查看详情 ></span>
                </div>
            </div>

            <!-- 客户卡片5 -->
            <div class="customer-card" onclick="goToDetail('CUST_005')">
                <div class="customer-header">
                    <div>
                        <div class="customer-name">刘先生</div>
                        <div class="customer-phone">135****3333</div>
                    </div>
                    <span class="customer-tag tag-warning">中意向</span>
                </div>
                <div class="customer-info">
                    <div class="customer-info-item">
                        <i class="fa fa-home"></i>
                        <span class="customer-building">万科城市之光</span>
                    </div>
                    <div class="customer-info-item">
                        <i class="fa fa-user"></i>
                        <span>转介绍</span>
                    </div>
                </div>
                <div class="customer-footer">
                    <span>最新跟进：2天前</span>
                    <span class="text-primary">查看详情 ></span>
                </div>
            </div>
        </div>

        <!-- 空状态（默认隐藏） -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">
                <i class="fa fa-user-o"></i>
            </div>
            <div class="empty-text">暂无客户信息</div>
        </div>

        <!-- 新增按钮 -->
        <div class="add-btn" onclick="addCustomer()">
            <i class="fa fa-plus"></i>
            <span>新增客户</span>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>
    </div>

    <script>
        // 显示Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 跳转到客户详情
        function goToDetail(customerId) {
            window.location.href = 'detail.html?id=' + customerId;
        }

        // 新增客户
        function addCustomer() {
            window.location.href = 'add.html';
        }

        // 按意向等级筛选
        function filterByLevel(level) {
            // 更新标签样式
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // 实际项目中这里应该调用API筛选
            showToast('筛选：' + (level || '全部'));
        }

        // 搜索
        function handleSearch() {
            const keyword = document.getElementById('searchInput').value;
            // 实际项目中这里应该调用API搜索
            console.log('搜索关键词:', keyword);
        }

        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            console.log('客户列表页面加载完成');
        });
    </script>
</body>
</html>
