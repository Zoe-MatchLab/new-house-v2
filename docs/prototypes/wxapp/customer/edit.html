<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>编辑客户 - 房产AI助手</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #FA8C16;
            --brand-primary-dark: #E67A0E;
            --brand-primary-light: #FFF7E6;
            --color-success: #00B42A;
            --color-warning: #FF7D00;
            --color-danger: #FA5151;
            --color-title: #1D2129;
            --color-text: #4E5969;
            --color-sub: #86909C;
            --color-border: #E5E6EB;
            --color-bg: #F7F8FA;
            --radius-md: 8px;
            --radius-lg: 12px;
            --spacing-md: 16px;
            --spacing-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            font-size: 14px;
            color: var(--color-text);
            background: var(--color-bg);
            -webkit-font-smoothing: antialiased;
        }

        .page {
            min-height: 100vh;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }

        /* 顶部导航 */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--spacing-md);
            z-index: 100;
            border-bottom: 1px solid var(--color-border);
        }

        .nav-back {
            color: var(--brand-primary);
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            user-select: none;
        }

        .nav-back:active {
            opacity: 0.7;
        }

        .nav-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--color-title);
        }

        .nav-save {
            color: var(--brand-primary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
        }

        .nav-save:active {
            opacity: 0.7;
        }

        .nav-delete {
            color: var(--color-danger);
            font-size: 15px;
            cursor: pointer;
            user-select: none;
        }

        .nav-delete:active {
            opacity: 0.7;
        }

        /* 说明文字 */
        .page-tip {
            padding: var(--spacing-md);
            padding-top: 60px;
            font-size: 13px;
            color: var(--color-sub);
            background: var(--color-bg);
        }

        /* 卡片表单 */
        .form-card {
            background: white;
            border-radius: var(--radius-lg);
            margin: 0 var(--spacing-md);
        }

        .form-item {
            display: flex;
            align-items: flex-start;
            padding: 14px var(--spacing-md);
            border-bottom: 1px solid var(--color-border);
        }

        .form-item:last-child {
            border-bottom: none;
        }

        .form-label {
            width: 70px;
            font-size: 15px;
            color: var(--color-title);
            padding-top: 2px;
            flex-shrink: 0;
        }

        .form-label.required::after {
            content: ' *';
            color: var(--color-danger);
        }

        .form-control {
            flex: 1;
            min-height: 24px;
        }

        .form-input {
            width: 100%;
            font-size: 15px;
            color: var(--color-title);
            border: none;
            outline: none;
            background: transparent;
            line-height: 1.5;
        }

        .form-input::placeholder {
            color: #C9CDD4;
        }

        .form-textarea {
            width: 100%;
            font-size: 15px;
            color: var(--color-title);
            border: none;
            outline: none;
            background: transparent;
            line-height: 1.5;
            resize: none;
            min-height: 60px;
        }

        .form-textarea::placeholder {
            color: #C9CDD4;
        }

        /* 底部按钮 */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px var(--spacing-md);
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background: white;
            border-top: 1px solid var(--color-border);
            z-index: 100;
        }

        .btn-primary {
            width: 100%;
            height: 44px;
            background: var(--brand-primary);
            color: white;
            border: none;
            border-radius: 22px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.15s ease;
        }

        .btn-primary:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .btn-primary:disabled {
            background: #CCC;
            cursor: not-allowed;
        }

        .btn-danger {
            width: 100%;
            height: 44px;
            background: white;
            color: var(--color-danger);
            border: 1px solid var(--color-danger);
            border-radius: 22px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.2s ease;
        }

        .btn-danger:active {
            background: #FFF5F5;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 10000;
            display: none;
        }

        .toast.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 删除确认弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: var(--radius-lg);
            width: calc(100% - 60px);
            max-width: 300px;
            overflow: hidden;
        }

        .modal-body {
            padding: 24px 20px;
            text-align: center;
        }

        .modal-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--color-title);
            margin-bottom: 8px;
        }

        .modal-desc {
            font-size: 14px;
            color: var(--color-sub);
        }

        .modal-footer {
            border-top: 1px solid var(--color-border);
            display: flex;
        }

        .modal-btn {
            flex: 1;
            padding: 14px 0;
            text-align: center;
            font-size: 16px;
            cursor: pointer;
            user-select: none;
        }

        .modal-btn:active {
            background: var(--color-bg);
        }

        .modal-btn.cancel {
            color: var(--color-text);
            border-right: 1px solid var(--color-border);
        }

        .modal-btn.confirm {
            color: var(--color-danger);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- 顶部导航 -->
        <div class="nav-bar">
            <div class="nav-back" onclick="goBack()">
                <i class="fa fa-chevron-left"></i>
                <span>返回</span>
            </div>
            <span class="nav-title" id="pageTitle">编辑客户</span>
            <div class="nav-delete" onclick="showDeleteModal()">删除</div>
        </div>

        <!-- 说明 -->
        <div class="page-tip">
            <i class="fa fa-info-circle"></i> 填写客户信息，用于关联录音分析
        </div>

        <!-- 表单卡片 -->
        <div class="form-card">
            <!-- 客户姓名 -->
            <div class="form-item">
                <div class="form-label required">姓名</div>
                <div class="form-control">
                    <input type="text" class="form-input" id="name" placeholder="请输入客户姓名" maxlength="20">
                </div>
            </div>

            <!-- 手机号 -->
            <div class="form-item">
                <div class="form-label required">手机号</div>
                <div class="form-control">
                    <input type="tel" class="form-input" id="phone" placeholder="请输入手机号" maxlength="11">
                </div>
            </div>

            <!-- 备注 -->
            <div class="form-item" style="align-items: flex-start;">
                <div class="form-label">备注</div>
                <div class="form-control">
                    <textarea class="form-textarea" id="remark" placeholder="选填，可记录客户偏好、需求等信息" rows="3"></textarea>
                </div>
            </div>
        </div>

        <!-- 创建时间（仅编辑时显示） -->
        <div class="page-tip" id="createTimeTip" style="display: none;">
            创建于 <span id="createTime">2026-04-10 10:00</span>
        </div>
    </div>

    <!-- 底部保存按钮 -->
    <div class="bottom-bar">
        <button class="btn-danger" id="deleteBtn" onclick="showDeleteModal()">删除客户</button>
        <button class="btn-primary" id="saveBtn" onclick="saveCustomer()">保存</button>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-content">
            <div class="modal-body">
                <div class="modal-title">确认删除？</div>
                <div class="modal-desc">删除后，与该客户关联的录音分析将解除关联关系</div>
            </div>
            <div class="modal-footer">
                <div class="modal-btn cancel" onclick="hideDeleteModal()">取消</div>
                <div class="modal-btn confirm" onclick="confirmDelete()">确认删除</div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // 页面状态
        const isEditMode = false; // 根据URL参数判断
        let customerId = null;

        // 初始化
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            customerId = urlParams.get('id');

            if (customerId) {
                // 编辑模式
                isEditMode = true;
                document.getElementById('pageTitle').textContent = '编辑客户';
                document.getElementById('createTimeTip').style.display = 'block';
                loadCustomerData(customerId);
            } else {
                // 新增模式
                isEditMode = false;
                document.getElementById('pageTitle').textContent = '新增客户';
                document.getElementById('createTimeTip').style.display = 'none';
                document.getElementById('deleteBtn').style.display = 'none';
            }
        }

        // 加载客户数据（模拟）
        function loadCustomerData(id) {
            // 模拟数据
            document.getElementById('name').value = '张先生';
            document.getElementById('phone').value = '138****8888';
            document.getElementById('remark').value = '对中海汇德里感兴趣，预算800万左右';
            document.getElementById('createTime').textContent = '2026-04-10 10:00';
        }

        // 显示Toast
        function showToast(message, duration) {
            duration = duration || 2000;
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // 返回
        function goBack() {
            window.location.href = 'list.html';
        }

        // 校验表单
        function validateForm() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();

            if (!name) {
                showToast('请输入客户姓名');
                return false;
            }

            if (!phone) {
                showToast('请输入手机号');
                return false;
            }

            // 简单手机号校验（脱敏后的也允许）
            const phonePattern = /^1[3-9]\d{9}$|^1[3-9]\d\*+\d{4}$/;
            if (!phonePattern.test(phone)) {
                showToast('请输入正确的手机号');
                return false;
            }

            return true;
        }

        // 保存客户
        function saveCustomer() {
            if (!validateForm()) {
                return;
            }

            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const remark = document.getElementById('remark').value.trim();

            const customerData = {
                id: customerId || ('CUST_' + Date.now()),
                name,
                phone,
                remark,
                createTime: isEditMode ? document.getElementById('createTime').textContent : new Date().toLocaleString()
            };

            console.log('保存客户信息:', customerData);

            showToast('保存成功');

            setTimeout(() => {
                window.location.href = 'list.html';
            }, 1500);
        }

        // 显示删除弹窗
        function showDeleteModal() {
            document.getElementById('deleteModal').classList.add('show');
        }

        // 隐藏删除弹窗
        function hideDeleteModal() {
            document.getElementById('deleteModal').classList.remove('show');
        }

        // 确认删除
        function confirmDelete() {
            hideDeleteModal();
            
            console.log('删除客户:', customerId);
            
            showToast('删除成功', 1500);
            
            setTimeout(() => {
                window.location.href = 'list.html';
            }, 1500);
        }

        // 初始化执行
        init();
    </script>
</body>
</html>
