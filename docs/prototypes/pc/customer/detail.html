<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户详情 - 房产AI作业平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                        dark: '#1D2129',
                        'gray-light': '#F2F3F5',
                    }
                }
            }
        }
    </script>
    <style>
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .tag-potential { background: #F0F5FF; color: #165DFF; }
        .tag-following { background: #FFF7E8; color: #FF7D00; }
        .tag-dealed { background: #E8FFEA; color: #00B42A; }
        .tag-lost { background: #F2F3F5; color: #4E5969; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-white shadow-sm fixed top-0 left-0 right-0 z-50">
        <div class="flex justify-between items-center px-6 py-3">
            <div class="flex items-center space-x-2">
                <i class="fa fa-home text-primary text-2xl"></i>
                <span class="text-xl font-bold text-dark">房产AI作业平台</span>
                <span class="text-sm text-gray-500 ml-2">管理后台</span>
            </div>
            <div class="flex items-center space-x-4">
                <button class="text-gray-600 hover:text-primary relative">
                    <i class="fa fa-bell-o text-lg"></i>
                    <span class="absolute top-0 right-0 bg-danger text-white text-xs rounded-full w-4 h-4 flex items-center justify-center">5</span>
                </button>
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-primary text-white rounded-full flex items-center justify-center">管</div>
                    <span class="text-sm font-medium">区域经理A</span>
                    <i class="fa fa-angle-down text-gray-400"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- 侧边栏 -->
    <div class="flex pt-14">
        <aside class="w-64 bg-white h-[calc(100vh-56px)] fixed left-0 shadow-sm">
            <nav class="py-4">
                <div class="px-4 py-2 text-xs text-gray-400 uppercase font-medium">功能菜单</div>
                <a href="../new-building/list.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-building-o w-5 text-center"></i>
                    <span class="ml-3">新盘管理</span>
                </a>
                <a href="../task/list.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-tasks w-5 text-center"></i>
                    <span class="ml-3">任务管理</span>
                </a>
                <a href="../recording/list.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-microphone w-5 text-center"></i>
                    <span class="ml-3">录音分析</span>
                </a>
                <a href="../content/content-list.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-cubes w-5 text-center"></i>
                    <span class="ml-3">内容管理</span>
                </a>
                <a href="list.html" class="flex items-center px-4 py-3 text-primary bg-blue-50 border-r-4 border-primary">
                    <i class="fa fa-users w-5 text-center"></i>
                    <span class="ml-3">客户管理</span>
                </a>
                <a href="../dashboard/overview.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-line-chart w-5 text-center"></i>
                    <span class="ml-3">数据看板</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="ml-64 flex-1 p-6">
            <!-- 面包屑 -->
            <div class="mb-4 text-sm">
                <a href="list.html" class="text-primary hover:underline">客户管理</a>
                <span class="mx-2 text-gray-400">/</span>
                <span class="text-gray-500">客户详情</span>
            </div>

            <!-- 页面标题 -->
            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-800">王女士</h1>
                <p class="text-gray-500 text-sm mt-1">手机号：138****1234 | 经纪人：张三 | 关联录音：8条</p>
            </div>

            <!-- Tab切换 -->
            <div class="bg-white rounded-lg shadow-sm mb-6">
                <div class="flex border-b border-gray-200">
                    <button onclick="switchTab('info')" id="tabInfo" class="px-6 py-3 text-sm font-medium text-primary border-b-2 border-primary">
                        客户信息
                    </button>
                    <button onclick="switchTab('records')" id="tabRecords" class="px-6 py-3 text-sm font-medium text-gray-500 hover:text-primary">
                        关联录音
                    </button>
                </div>
            </div>

            <!-- 客户信息Tab -->
            <div id="panelInfo" class="bg-white rounded-lg shadow-sm p-6">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <div class="text-sm text-gray-500 mb-1">客户姓名</div>
                        <div class="font-medium">王女士</div>
                    </div>
                    <div>
                        <div class="text-sm text-gray-500 mb-1">手机号</div>
                        <div class="font-medium">138****1234</div>
                    </div>
                    <div>
                        <div class="text-sm text-gray-500 mb-1">经纪人</div>
                        <div class="font-medium">张三</div>
                    </div>
                    <div>
                        <div class="text-sm text-gray-500 mb-1">关联录音数</div>
                        <div class="font-medium text-primary">8 条</div>
                    </div>
                    <div>
                        <div class="text-sm text-gray-500 mb-1">创建时间</div>
                        <div class="font-medium">2026-04-01 10:00</div>
                    </div>
                    <div class="col-span-2">
                        <div class="text-sm text-gray-500 mb-1">备注</div>
                        <div class="font-medium text-gray-600">客户对房产有兴趣，预算800-900万。</div>
                    </div>
                </div>
            </div>

            <!-- 关联录音Tab -->
            <div id="panelRecords" class="bg-white rounded-lg shadow-sm hidden">
                <!-- 筛选栏 -->
                <div class="p-4 border-b border-gray-100">
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2">
                            <input type="text" id="filterRecordingName" placeholder="搜索录音名称" class="border border-gray-200 rounded-lg px-3 py-2 text-sm w-48">
                        </div>
                        <select id="filterRecordingStatus" class="border border-gray-200 rounded-lg px-3 py-2 text-sm">
                            <option value="">全部状态</option>
                            <option value="completed">分析完成</option>
                            <option value="progress">分析中</option>
                            <option value="pending">待分析</option>
                            <option value="failed">分析失败</option>
                        </select>
                        <button onclick="applyRecordingFilters()" class="px-3 py-2 bg-primary text-white rounded-lg text-sm hover:bg-primary/90">搜索</button>
                        <button onclick="resetRecordingFilters()" class="px-3 py-2 border border-gray-200 text-gray-600 rounded-lg text-sm hover:bg-gray-50">重置</button>
                    </div>
                </div>
                
                <!-- 录音列表 -->
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="text-left text-gray-500 text-xs bg-gray-50">
                                <th class="px-4 py-3 font-medium">录音名称</th>
                                <th class="px-4 py-3 font-medium">关联楼盘</th>
                                <th class="px-4 py-3 font-medium">录音时长</th>
                                <th class="px-4 py-3 font-medium">分析状态</th>
                                <th class="px-4 py-3 font-medium">综合评分</th>
                                <th class="px-4 py-3 font-medium">上传时间</th>
                                <th class="px-4 py-3 font-medium text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="recordingTableBody"></tbody>
                    </table>
                </div>
                
                <!-- 分页 -->
                <div class="flex items-center justify-between px-4 py-3 border-t border-gray-100">
                    <div class="text-sm text-gray-500">
                        共 <span class="font-medium" id="recordingTotalCount">3</span> 条
                    </div>
                    <div class="flex items-center gap-1">
                        <button class="px-3 py-1 border border-gray-200 rounded text-sm text-gray-400 cursor-not-allowed" disabled>上一页</button>
                        <button class="px-3 py-1 bg-primary text-white rounded text-sm">1</button>
                        <button class="px-3 py-1 border border-gray-200 rounded text-sm text-gray-600 hover:bg-gray-50">下一页</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 录音数据（该客户的关联录音）
        const customerRecordings = [
            {
                id: 1,
                name: '王女士-万科城市花园-20260416',
                buildingName: '万科城市花园',
                duration: '05:32',
                status: 'completed',
                statusText: '分析完成',
                score: 85,
                uploadTime: '2026-04-16 14:30'
            },
            {
                id: 2,
                name: '王女士-万科城市花园-20260415',
                buildingName: '万科城市花园',
                duration: '08:15',
                status: 'completed',
                statusText: '分析完成',
                score: 92,
                uploadTime: '2026-04-15 10:20'
            },
            {
                id: 3,
                name: '王女士-中海汇德里-20260408',
                buildingName: '中海汇德里',
                duration: '03:45',
                status: 'progress',
                statusText: '分析中',
                score: null,
                uploadTime: '2026-04-08 16:45'
            }
        ];

        // 渲染录音列表
        function renderRecordingTable(data) {
            const tbody = document.getElementById('recordingTableBody');
            document.getElementById('recordingTotalCount').textContent = data.length;
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-500">暂无关联录音</td></tr>';
                return;
            }
            
            tbody.innerHTML = data.map(item => `
                <tr class="border-b border-gray-100 hover:bg-gray-50">
                    <td class="px-4 py-3 text-sm">
                        <div class="flex items-center gap-2">
                            <i class="fa fa-microphone text-gray-400"></i>
                            <span class="text-primary cursor-pointer hover:underline" onclick="viewRecording(${item.id})">${item.name}</span>
                        </div>
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-600">${item.buildingName || '-'}</td>
                    <td class="px-4 py-3 text-sm text-gray-600">${item.duration}</td>
                    <td class="px-4 py-3 text-sm">
                        <span class="tag tag-${item.status === 'completed' ? 'completed' : item.status === 'progress' ? 'progress' : item.status === 'failed' ? 'failed' : 'pending'}">
                            ${item.statusText}
                        </span>
                    </td>
                    <td class="px-4 py-3 text-sm">
                        ${item.score ? `<span class="font-medium ${item.score >= 90 ? 'text-success' : item.score >= 80 ? 'text-primary' : item.score >= 70 ? 'text-warning' : 'text-danger'}">${item.score}分</span>` : '-'}
                    </td>
                    <td class="px-4 py-3 text-sm text-gray-500">${item.uploadTime}</td>
                    <td class="px-4 py-3 text-sm text-right">
                        <button onclick="viewRecording(${item.id})" class="text-primary hover:underline">查看详情</button>
                    </td>
                </tr>
            `).join('');
        }

        // 查看录音详情
        function viewRecording(id) {
            window.location.href = `../recording/detail.html?id=${id}`;
        }

        // 筛选录音
        function applyRecordingFilters() {
            const name = document.getElementById('filterRecordingName').value.toLowerCase();
            const status = document.getElementById('filterRecordingStatus').value;
            
            let filtered = customerRecordings;
            
            if (name) {
                filtered = filtered.filter(item => item.name.toLowerCase().includes(name));
            }
            if (status) {
                filtered = filtered.filter(item => item.status === status);
            }
            
            renderRecordingTable(filtered);
        }

        // 重置筛选
        function resetRecordingFilters() {
            document.getElementById('filterRecordingName').value = '';
            document.getElementById('filterRecordingStatus').value = '';
            renderRecordingTable(customerRecordings);
        }

        // Tab切换
        function switchTab(tab) {
            const tabInfo = document.getElementById('tabInfo');
            const tabRecords = document.getElementById('tabRecords');
            const panelInfo = document.getElementById('panelInfo');
            const panelRecords = document.getElementById('panelRecords');

            if (tab === 'info') {
                tabInfo.classList.add('text-primary', 'border-b-2', 'border-primary');
                tabInfo.classList.remove('text-gray-500');
                tabRecords.classList.remove('text-primary', 'border-b-2', 'border-primary');
                tabRecords.classList.add('text-gray-500');
                panelInfo.classList.remove('hidden');
                panelRecords.classList.add('hidden');
            } else {
                tabRecords.classList.add('text-primary', 'border-b-2', 'border-primary');
                tabRecords.classList.remove('text-gray-500');
                tabInfo.classList.remove('text-primary', 'border-b-2', 'border-primary');
                tabInfo.classList.add('text-gray-500');
                panelRecords.classList.remove('hidden');
                panelInfo.classList.add('hidden');
            }
        }

        // 初始化录音列表
        renderRecordingTable(customerRecordings);
    </script>
</body>
</html>
