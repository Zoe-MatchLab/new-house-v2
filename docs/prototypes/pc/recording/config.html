<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置分析配置 - 房产AI作业平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                        dark: '#1D2129',
                        'gray-light': '#F2F3F5',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-white shadow-sm fixed top-0 left-0 right-0 z-50">
        <div class="flex justify-between items-center px-6 py-3">
            <div class="flex items-center space-x-2">
                <i class="fa fa-home text-primary text-2xl"></i>
                <span class="text-xl font-bold text-dark">房产AI作业平台</span>
                <span class="text-sm text-gray-500 ml-2">管理后台</span>
            </div>
            <div class="flex items-center space-x-4">
                <button class="text-gray-600 hover:text-primary relative">
                    <i class="fa fa-bell-o text-lg"></i>
                    <span class="absolute top-0 right-0 bg-danger text-white text-xs rounded-full w-4 h-4 flex items-center justify-center">5</span>
                </button>
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-primary text-white rounded-full flex items-center justify-center">管</div>
                    <span class="text-sm font-medium">区域经理A</span>
                    <i class="fa fa-angle-down text-gray-400"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- 侧边栏 -->
    <div class="flex pt-14">
        <aside class="w-64 bg-white h-[calc(100vh-56px)] fixed left-0 shadow-sm">
            <nav class="py-4">
                <div class="px-4 py-2 text-xs text-gray-400 uppercase font-medium">功能菜单</div>
                <a href="../new-building/list.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-building-o w-5 text-center"></i>
                    <span class="ml-3">新盘管理</span>
                </a>
                <a href="../task/list.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-tasks w-5 text-center"></i>
                    <span class="ml-3">任务管理</span>
                </a>
                <a href="list.html" class="flex items-center px-4 py-3 text-primary bg-blue-50 border-r-4 border-primary">
                    <i class="fa fa-microphone w-5 text-center"></i>
                    <span class="ml-3">录音分析</span>
                </a>
                <div class="pl-8">
                    <a href="list.html" class="flex items-center px-4 py-2 text-sm text-gray-500 hover:text-primary">
                        <span>录音列表</span>
                    </a>
                    <a href="config-list.html" class="flex items-center px-4 py-2 text-sm text-primary font-medium">
                        <span>分析配置</span>
                    </a>
                    <a href="statistics.html" class="flex items-center px-4 py-2 text-sm text-gray-400 hover:text-primary hidden">
                        <span>统计分析</span>
                    </a>
                </div>
                <a href="../material/list.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-cubes w-5 text-center"></i>
                    <span class="ml-3">物料管理</span>
                </a>
                <a href="../customer/list.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-users w-5 text-center"></i>
                    <span class="ml-3">客户管理</span>
                </a>
                <a href="../dashboard/overview.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-line-chart w-5 text-center"></i>
                    <span class="ml-3">数据看板</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="ml-64 flex-1 p-6">
            <!-- 面包屑 -->
            <div class="mb-4 text-sm">
                <a href="list.html" class="text-primary hover:underline">录音分析</a>
                <span class="mx-2 text-gray-400">/</span>
                <a href="list.html" class="text-primary hover:underline">分析配置</a>
                <span id="breadcrumbEdit" class="mx-2 text-gray-400 hidden">/</span>
                <span id="breadcrumbTitle" class="text-gray-500 hidden">编辑配置</span>
            </div>

            <!-- 页面标题 -->
            <div class="mb-6">
                <h1 id="pageTitle" class="text-2xl font-bold text-gray-800">新增配置</h1>
                <p id="pageDesc" class="text-gray-500 text-sm mt-1">创建新的录音分析配置</p>
            </div>

            <!-- Tab切换 -->
            <div class="bg-white rounded-lg shadow-sm mb-4">
                <div class="flex border-b border-gray-200">
                    <button onclick="switchTab('basic')" id="tabBasic" class="px-6 py-3 text-sm font-medium text-primary border-b-2 border-primary">
                        基本配置
                    </button>
                    <button onclick="switchTab('prompt')" id="tabPrompt" class="px-6 py-3 text-sm font-medium text-gray-500 hover:text-primary">
                        提示词配置
                    </button>
                </div>
            </div>

            <!-- 基本配置Tab -->
            <div id="panelBasic" class="bg-white rounded-lg shadow-sm p-6 max-w-2xl">
                <div class="mb-6">
                    <label class="block text-sm text-gray-600 mb-2">
                        配置名称
                        <span class="text-danger">*</span>
                    </label>
                    <input type="text" id="configName" maxlength="20" placeholder="请输入配置名称" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-primary">
                    <div class="text-xs text-gray-400 mt-1 text-right"><span id="nameCount">0</span>/20</div>
                </div>

                <div id="sceneSelectWrapper" class="mb-6 hidden">
                    <label class="block text-sm text-gray-600 mb-2">
                        分析场景
                        <span class="text-danger">*</span>
                    </label>
                    <select id="sceneType" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-primary">
                        <option value="invitation">邀约录音分析</option>
                        <option value="negotiation">谈判录音分析</option>
                        <option value="visiting">带看录音分析</option>
                        <option value="custom">自定义场景</option>
                    </select>
                </div>

                <div id="sceneTextWrapper" class="mb-6 hidden">
                    <label class="block text-sm text-gray-600 mb-2">
                        分析场景
                    </label>
                    <div id="sceneText" class="text-gray-800 px-4 py-2.5 bg-gray-50 rounded-lg">邀约录音分析</div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm text-gray-600 mb-2">
                        场景说明
                    </label>
                    <textarea id="sceneDesc" maxlength="100" placeholder="请输入场景描述（可选）" rows="3" class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-primary resize-none"></textarea>
                    <div class="text-xs text-gray-400 mt-1 text-right"><span id="descCount">0</span>/100</div>
                </div>

                <div id="enabledWrapper" class="mb-6 hidden">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" id="isEnabled" class="w-5 h-5 rounded border-gray-300 text-primary focus:ring-primary">
                        <span class="text-sm text-gray-600">启用该配置</span>
                    </label>
                </div>
            </div>

            <!-- 提示词配置Tab -->
            <div id="panelPrompt" class="bg-white rounded-lg shadow-sm hidden">
                <div class="p-6">
                    <div class="mb-4">
                        <label class="block text-sm text-gray-600 mb-2">
                            分析提示词
                            <span class="text-danger">*</span>
                            <span class="text-xs text-gray-400 ml-1">用于AI分析录音的Prompt模板</span>
                        </label>
                        <textarea id="promptTemplate" placeholder="请输入分析提示词模板，使用{transcript}作为录音转文本占位符" rows="12" class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-primary resize-none font-mono"></textarea>
                    </div>
                    <div class="p-4 bg-gray-50 rounded-lg">
                        <div class="text-sm font-medium text-gray-700 mb-2">提示：</div>
                        <ul class="text-sm text-gray-500 space-y-1">
                            <li>• 使用 <code class="bg-gray-200 px-1.5 py-0.5 rounded text-xs">{transcript}</code> 作为录音转文本占位符</li>
                            <li>• 定义输出格式要求，如评分标准、输出结构等</li>
                            <li>• 提示词会影响AI分析的质量，请仔细编写</li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 底部操作栏 -->
            <div class="bg-white rounded-lg shadow-sm p-4 mt-4 max-w-2xl flex justify-end gap-3">
                <button onclick="cancel()" class="px-6 py-2.5 border border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50">
                    取消
                </button>
                <button onclick="saveConfig()" class="px-6 py-2.5 bg-primary text-white rounded-lg hover:bg-primary/90">
                    保存
                </button>
            </div>
        </main>
    </div>

    <script>
        // 配置数据
        const configsData = [
            {
                id: 1,
                name: '邀约录音分析',
                scene: 'invitation',
                sceneText: '邀约录音分析',
                desc: '用于分析经纪人邀约客户的录音，提升邀约能力',
                promptTemplate: '你是一位专业的房产销售培训师。请分析以下经纪人邀约客户的录音，从产品熟悉度、需求挖掘、应变能力、成交意识四个维度进行评估，并给出具体的改进建议。\n\n录音内容：\n{transcript}\n\n请按照以下格式输出：\n1. 各维度得分（满分100）\n2. 关键话术点评（好的话术和需改进的话术）\n3. 改进建议',
                enabled: true,
                createTime: '2026-04-10 10:00'
            }
        ];

        // 从URL获取配置ID
        const urlParams = new URLSearchParams(window.location.search);
        const configId = parseInt(urlParams.get('id'));
        const isEditMode = !!configId;

        // Tab切换
        function switchTab(tab) {
            const tabBasic = document.getElementById('tabBasic');
            const tabPrompt = document.getElementById('tabPrompt');
            const panelBasic = document.getElementById('panelBasic');
            const panelPrompt = document.getElementById('panelPrompt');

            if (tab === 'basic') {
                tabBasic.classList.add('text-primary', 'border-b-2', 'border-primary');
                tabBasic.classList.remove('text-gray-500');
                tabPrompt.classList.remove('text-primary', 'border-b-2', 'border-primary');
                tabPrompt.classList.add('text-gray-500');
                panelBasic.classList.remove('hidden');
                panelPrompt.classList.add('hidden');
            } else {
                tabPrompt.classList.add('text-primary', 'border-b-2', 'border-primary');
                tabPrompt.classList.remove('text-gray-500');
                tabBasic.classList.remove('text-primary', 'border-b-2', 'border-primary');
                tabBasic.classList.add('text-gray-500');
                panelPrompt.classList.remove('hidden');
                panelBasic.classList.add('hidden');
            }
        }

        // 初始化
        function init() {
            if (isEditMode) {
                // 编辑模式
                document.getElementById('breadcrumbEdit').classList.remove('hidden');
                document.getElementById('breadcrumbTitle').classList.remove('hidden');
                document.getElementById('pageTitle').textContent = '编辑配置';
                document.getElementById('pageDesc').textContent = '修改分析配置的名称和提示词';

                const config = configsData.find(item => item.id === configId);
                if (!config) {
                    alert('配置不存在');
                    window.location.href = 'config-list.html';
                    return;
                }

                document.getElementById('configName').value = config.name;
                document.getElementById('nameCount').textContent = config.name.length;
                document.getElementById('sceneText').textContent = config.sceneText;
                document.getElementById('sceneDesc').value = config.desc || '';
                document.getElementById('descCount').textContent = (config.desc || '').length;
                document.getElementById('promptTemplate').value = config.promptTemplate || '';
                document.getElementById('isEnabled').checked = config.enabled;

                // 显示编辑相关字段
                document.getElementById('sceneTextWrapper').classList.remove('hidden');
                document.getElementById('enabledWrapper').classList.remove('hidden');
            } else {
                // 新增模式
                document.getElementById('pageTitle').textContent = '新增配置';
                document.getElementById('pageDesc').textContent = '创建新的录音分析配置';
                document.getElementById('sceneSelectWrapper').classList.remove('hidden');
            }
        }

        // 字数统计
        document.getElementById('configName').addEventListener('input', function() {
            document.getElementById('nameCount').textContent = this.value.length;
        });

        document.getElementById('sceneDesc').addEventListener('input', function() {
            document.getElementById('descCount').textContent = this.value.length;
        });

        // 保存
        function saveConfig() {
            const name = document.getElementById('configName').value.trim();
            const desc = document.getElementById('sceneDesc').value.trim();
            const promptTemplate = document.getElementById('promptTemplate').value.trim();

            if (!name) {
                alert('请输入配置名称');
                return;
            }

            if (!promptTemplate) {
                alert('请输入分析提示词');
                return;
            }

            if (isEditMode) {
                // 编辑
                const config = configsData.find(item => item.id === configId);
                if (config) {
                    config.name = name;
                    config.desc = desc;
                    config.promptTemplate = promptTemplate;
                    config.enabled = document.getElementById('isEnabled').checked;
                }
            } else {
                // 新增
                const scene = document.getElementById('sceneType').value;
                const sceneMap = {
                    'invitation': '邀约录音分析',
                    'negotiation': '谈判录音分析',
                    'visiting': '带看录音分析',
                    'custom': '自定义场景'
                };
                const newId = Math.max(...configsData.map(item => item.id), 0) + 1;
                configsData.push({
                    id: newId,
                    name,
                    scene,
                    sceneText: sceneMap[scene],
                    desc,
                    promptTemplate,
                    enabled: true,
                    createTime: new Date().toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/\//g, '-')
                });
            }

            alert('保存成功');
            window.location.href = 'list.html';
        }

        // 取消
        function cancel() {
            if (confirm('确定取消吗？')) {
                window.location.href = 'list.html';
            }
        }

        init();
    </script>
</body>
</html>
