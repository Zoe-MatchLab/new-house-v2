<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房产AI作业平台 - PC端原型</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: #F7F8FA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 { color: #1D2129; margin-bottom: 30px; font-size: 24px; }
        .modules {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
        }
        .module {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            text-decoration: none;
            color: #4E5969;
            transition: all 0.2s;
        }
        .module:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .module-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .module-name {
            font-size: 16px;
            font-weight: 600;
            color: #1D2129;
            margin-bottom: 4px;
        }
        .module-desc {
            font-size: 12px;
            color: #86909C;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 房产AI作业平台 - PC端原型</h1>
        <div class="modules">
            <a href="new-building/list.html" class="module">
                <div class="module-icon">🏗️</div>
                <div class="module-name">新盘列表</div>
                <div class="module-desc">新盘信息管理</div>
            </a>
            <a href="task/list.html" class="module">
                <div class="module-icon">📋</div>
                <div class="module-name">任务管理</div>
                <div class="module-desc">任务创建与追踪</div>
            </a>
            <a href="customer/list.html" class="module">
                <div class="module-icon">👥</div>
                <div class="module-name">客户管理</div>
                <div class="module-desc">客户信息管理</div>
            </a>
            <a href="recording/list.html" class="module">
                <div class="module-icon">🎙️</div>
                <div class="module-name">录音管理</div>
                <div class="module-desc">录音文件管理</div>
            </a>
            <a href="training/list.html" class="module">
                <div class="module-icon">📚</div>
                <div class="module-name">培训管理</div>
                <div class="module-desc">培训内容管理</div>
            </a>
            <a href="material/list.html" class="module">
                <div class="module-icon">📁</div>
                <div class="module-name">素材管理</div>
                <div class="module-desc">素材文件管理</div>
            </a>
        </div>
    </div>
</body>
</html>
